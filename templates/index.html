<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f7f9fc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 550px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        #chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; }
        
        /* Chat Window */
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; }
        .ai-msg { background: #f1f0f0; color: #333; align-self: flex-start; }
        .typing { color: #888; font-style: italic; font-size: 0.9em; align-self: flex-start; }

        /* Input Area */
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; padding-left: 15px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">AI Chat Assistant</div>
    <div id="chat-window" id="chat-box">
        <div class="message ai-msg">হ্যালো! আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="আপনার বার্তাটি লিখুন..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const sessionId = "{{ session_id }}"; // app.py থেকে আসছে

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const message = inputField.value.trim();

        if (!message) return;

        // User message UI-তে যোগ করা
        chatWindow.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = ''; // Input clear করা
        chatWindow.scrollTop = chatWindow.scrollHeight; // নিচে স্ক্রল করা

        // Typing status দেখানো
        const typingId = 'typing-' + Date.now();
        chatWindow.innerHTML += `<div class="typing" id="${typingId}">AI ভাবছে...</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            // আমাদের Python Backend-এ রিকোয়েস্ট পাঠানো
            const response = await fetch('/chat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, sessionId: sessionId })
            });

            const data = await response.json();
            
            // Typing status মুছে ফেলা
            const typingMsg = document.getElementById(typingId);
            if(typingMsg) typingMsg.remove();

            // AI-এর উত্তর UI-তে দেখানো
            chatWindow.innerHTML += `<div class="message ai-msg">${data.output || "দুঃখিত, কোনো উত্তর পাওয়া যায়নি।"}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (error) {
            console.error("Error:", error);
            const typingMsg = document.getElementById(typingId);
            if(typingMsg) typingMsg.remove();
            chatWindow.innerHTML += `<div class="message ai-msg">ভুল হয়েছে। দয়া করে পরে চেষ্টা করুন।</div>`;
        }
    }

    // এন্টার টিপলে মেসেজ সেন্ড করার জন্য
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
