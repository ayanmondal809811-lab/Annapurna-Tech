<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 80vh; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 0.95em; line-height: 1.4; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .typing { color: #777; font-size: 0.85em; margin-left: 5px; }
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 1em; }
        button { background: #28a745; color: white; border: none; padding: 0 20px; border-radius: 25px; margin-left: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">AI Chat Assistant</div>
    <div id="chat-window">
        <div class="message ai-msg">হ্যালো! আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="আপনার বার্তাটি লিখুন..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const sessionId = "{{ session_id }}";

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const message = inputField.value.trim();

        if (!message) return;

        // User UI
        chatWindow.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Show Typing
        const typingId = 'typing-' + Date.now();
        chatWindow.innerHTML += `<div class="typing" id="${typingId}">AI টাইপ করছে...</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch('/chat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, sessionId: sessionId })
            });

            const data = await response.json();
            
            document.getElementById(typingId)?.remove();

            // AI UI
            chatWindow.innerHTML += `<div class="message ai-msg">${data.output}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (error) {
            document.getElementById(typingId)?.remove();
            chatWindow.innerHTML += `<div class="message ai-msg" style="color: red;">দুঃখিত, সংযোগ বিচ্ছিন্ন হয়েছে। আবার চেষ্টা করুন।</div>`;
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
