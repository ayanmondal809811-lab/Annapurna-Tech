<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-4 text-white text-center font-bold">AI Chat Assistant</div>
        <div id="chat-box" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-50">
            <div class="text-left bg-gray-200 p-2 rounded-lg inline-block max-w-[80%]">
                হ্যালো! আমি আপনাকে কীভাবে সাহায্য করতে পারি?
            </div>
        </div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="user-input" class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="আপনার বার্তাটি লিখুন...">
            <button onclick="sendMessage()" class="bg-green-500 text-white px-4 py-2 rounded-full hover:bg-green-600">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<div class="text-right"><div class="bg-blue-500 text-white p-2 rounded-lg inline-block max-w-[80%]">${userMsg}</div></div>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: userMsg})
                });
                const data = await response.json();
                const botMsg = data.output || data.message || "কোনো উত্তর পাওয়া যায়নি";
                chatBox.innerHTML += `<div class="text-left"><div class="bg-gray-200 p-2 rounded-lg inline-block max-w-[80%]">${botMsg}</div></div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="text-red-500">Error: ${error.message}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
